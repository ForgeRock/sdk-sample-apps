name: 'GitHub Copilot Code Review'

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: GitHub Copilot Code Review
        uses: github/copilot-code-review@v1
        with:
          github-token: ${{ secrets.COPILOT_ACCESS_TOKEN }}

